<div class="login-container">
    <h2>Acceso</h2>

    <form [formGroup]="loginForm" (ngSubmit) = "onSubmit()" >

        <div class="form-group">
            <label for="email">Correo Electronico</label>
            <input type="email" formControlName="email" placeholder="tucorreo@mail.com">
            @if(loginForm.get('email')?.invalid && loginForm.get('email')?.touched){
                <small style="color: red;">Ingresa un correo valido</small>
            }
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" formControlName="password" placeholder="Ingresa tu contraseña">
        </div>

        <button type="submit" [disabled]="loginForm.invalid"  >Ingresar</button>

    </form>

</div>
