<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<div class="bg-main min-h-screen flex justify-center items-center transition-colors duration-300">
    
    <div class="bg-card flex shadow-lg max-w-3xl p-16 rounded-2xl transition-colors duration-300 border border-border-main">

        <!-- formulario -->
        <div class="sm:w-1/2 px-16 flex flex-col justify-center">
            <h2 class="font-bold text-2xl text-brand">Login</h2>
            <p class="text-sm mt-4 text-text-main">Si ya tienes una cuenta puedes acceder con tu correo electrónico</p>
            
            <form class="flex flex-col gap-4" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
                <div class="mt-8">
                    <input class="p-2 rounded-xl border border-border-main bg-input text-text-main w-full placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-brand" 
                           type="email" formControlName="email" placeholder="tucorreo@mail.com">
                    @if(loginForm.get('email')?.invalid && loginForm.get('email')?.touched){
                        <small class="text-red-500 mt-1 block">Ingresa un correo válido</small>
                    }
                </div>

                <div class="relative mt-2">
                    <input class="p-2 rounded-xl border border-border-main bg-input text-text-main w-full placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-brand pr-10" 
                           type="password" formControlName="password" placeholder="Ingresa tu contraseña">
                    <span class="material-symbols-outlined absolute top-1/2 right-3 -translate-y-1/2 text-text-muted cursor-pointer hover:text-brand transition-colors">visibility</span>
                </div>
        
                <button class="bg-brand py-2 rounded-xl text-white font-medium hover:opacity-90 transition-opacity disabled:opacity-50 mt-2" 
                        type="submit" [disabled]="loginForm.invalid">
                    Ingresar
                </button>
            </form>  

            <div class="mt-10 grid grid-cols-3 items-center text-text-muted">
                <hr class="border-border-main">
                <p class="text-center text-sm font-medium">Si no tienes una cuenta</p>
                <hr class="border-border-main">
            </div>

            <button class="bg-input border border-border-main text-text-main py-2 w-full rounded-xl mt-5 flex justify-center items-center gap-2 hover:bg-main transition-colors">
                Registrar
                <span class="material-symbols-outlined">person_add</span>
            </button>

            <button class="mt-5 py-6 text-xs text-text-muted hover:text-brand transition-colors text-center w-full">
                Olvidé mi contraseña
            </button>
        </div>


        <!-- imagen -->
        <div class="sm:block hidden w-1/2 relative">
            
            <img 
              class="absolute inset-0 rounded-2xl h-full w-full object-cover transition-opacity duration-1000 ease-in-out" 
              src="/photo/login-photo.jpg" 
              alt="Login Light"
              [class.opacity-100]="!isDarkMode"
              [class.opacity-0]="isDarkMode">

            <img 
              class="absolute inset-0 rounded-2xl h-full w-full object-cover transition-opacity duration-1000 ease-in-out" 
              src="/photo/login-photo-night.png" 
              alt="Login Dark"
              [class.opacity-100]="isDarkMode"
              [class.opacity-0]="!isDarkMode">
        </div>

        
    </div>
    

    <button 
                  type="button"
                  (click)="toggleTheme()" 
                  class="p-2 rounded-full bg-input border border-border-main shadow-sm hover:opacity-80 transition-all duration-300 flex items-center justify-center">
                  
                  @if(isDarkMode) {
                    <span class="material-symbols-outlined text-yellow-400">light_mode</span>
                  } @else {
                    <span class="material-symbols-outlined text-brand transition-colors">dark_mode</span>
                  }
                </button>
</div>
